specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Google Data Studio
providerId: google-data-studio
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Business Intelligence
  - Reporting
  - Dashboards
  - Google Cloud
description: 'Google Data Studio (rebranded as Looker Studio) is offered in two SKUs: Looker Studio (free)
  for individual reporting, and Looker Studio Pro - a per-user subscription with team workspaces, content
  management, and enterprise support, billed through Google Cloud. The full Looker platform (Standard
  / Enterprise / Embed) is sold via annual commitment with separate Developer / Standard / Viewer user
  classes. Conversational Analytics adds a new token-based meter starting October 2026.'
sources:
  - https://cloud.google.com/looker/pricing
  - https://lookerstudio.google.com/
  - https://cloud.google.com/looker-studio
plans:
  - id: google-data-studio-free
    name: Looker Studio (Free)
    type: freemium
    description: Free interactive dashboarding and reporting. Best for individual users; no SLA, no Cloud
      Support.
    entries:
      - label: Per-user license
        description: Free per-user access
        name: free_user
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://lookerstudio.google.com
        unit: 1
        price: '0.00'
        userMultiplied: true
    elements:
      - name: Unlimited reports and data sources
      - name: 700+ community connectors
      - name: Sharing via link or email
      - name: Best-effort support
  - id: google-data-studio-pro
    name: Looker Studio Pro
    type: subscription
    description: Paid per-user upgrade with team workspaces, content management, asset-level access controls,
      Cloud Support, and integration with the wider Looker family. Pricing is set through Google Cloud
      contact-sales; not posted as a list price.
    entries:
      - label: Per-user license
        description: Per-user monthly subscription billed through Google Cloud
        name: pro_user
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://lookerstudio.google.com
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: Team workspaces
      - name: Content management and asset-level permissions
      - name: Looker Studio APIs
      - name: Customer Care (Cloud Support)
      - name: Integration with Looker / Vertex AI
  - id: google-looker-standard
    name: Looker Standard
    type: enterprise
    description: Annual commitment edition for small teams (<50 users). One production instance, 10 Standard
      + 2 Developer users included. Pricing via sales.
    entries:
      - label: Annual instance
        description: Annual commitment for one production Looker instance
        name: standard_instance
        type: subscription
        metric: contract
        limit: 1
        timeFrame: year
        geo: global
        domains:
          - https://looker.com
          - https://cloud.google.com/looker
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Query API calls
        description: Monthly Query API allocation included with Standard
        name: standard_query_api
        type: quota
        metric: requests_per_month
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://looker.com
        unit: 1
        price: included
        userMultiplied: false
      - label: Admin API calls
        description: Monthly Admin API allocation included with Standard
        name: standard_admin_api
        type: quota
        metric: requests_per_month
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://looker.com
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: 1 production instance
      - name: 10 Standard + 2 Developer users included
      - name: 1K query / 1K admin API calls per month
      - name: Standard support
  - id: google-looker-enterprise
    name: Looker Enterprise
    type: enterprise
    description: Enhanced-security edition. One production instance, 10 Standard + 2 Developer users included,
      100K query / 10K admin API calls per month. Pricing via sales.
    entries:
      - label: Annual instance
        description: Annual commitment for one production Looker Enterprise instance
        name: enterprise_instance
        type: subscription
        metric: contract
        limit: 1
        timeFrame: year
        geo: global
        domains:
          - https://looker.com
          - https://cloud.google.com/looker
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Query API calls
        description: Monthly Query API allocation included with Enterprise
        name: enterprise_query_api
        type: quota
        metric: requests_per_month
        limit: 100000
        timeFrame: month
        geo: global
        domains:
          - https://looker.com
        unit: 1
        price: included
        userMultiplied: false
      - label: Admin API calls
        description: Monthly Admin API allocation included with Enterprise
        name: enterprise_admin_api
        type: quota
        metric: requests_per_month
        limit: 10000
        timeFrame: month
        geo: global
        domains:
          - https://looker.com
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: 1 production instance
      - name: Enhanced security
      - name: 10 Standard + 2 Developer users included
      - name: 100K query / 10K admin API calls per month
  - id: google-looker-embed
    name: Looker Embed
    type: enterprise
    description: Edition for external analytics / OEM scenarios. One production instance, 10 Standard
      + 2 Developer users included, 500K query / 100K admin API calls per month. Pricing via sales.
    entries:
      - label: Annual instance
        description: Annual commitment for one production Looker Embed instance
        name: embed_instance
        type: subscription
        metric: contract
        limit: 1
        timeFrame: year
        geo: global
        domains:
          - https://looker.com
          - https://cloud.google.com/looker
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Query API calls
        description: Monthly Query API allocation included with Embed
        name: embed_query_api
        type: quota
        metric: requests_per_month
        limit: 500000
        timeFrame: month
        geo: global
        domains:
          - https://looker.com
        unit: 1
        price: included
        userMultiplied: false
      - label: Admin API calls
        description: Monthly Admin API allocation included with Embed
        name: embed_admin_api
        type: quota
        metric: requests_per_month
        limit: 100000
        timeFrame: month
        geo: global
        domains:
          - https://looker.com
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: 1 production instance for external/OEM use
      - name: 500K query / 100K admin API calls per month
      - name: External user licensing
  - id: google-looker-conversational-analytics
    name: Conversational Analytics (Data Tokens)
    type: usage-based
    description: Token-based pricing for the AI-driven Conversational Analytics features. Free through
      September 30, 2026; metered thereafter.
    entries:
      - label: Input data tokens
        description: Per-million input data tokens (post-October 2026)
        name: input_tokens
        type: metered
        metric: tokens
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://looker.com
        unit: 1000000
        price: '3.00'
        userMultiplied: false
      - label: Output data tokens
        description: Per-million output data tokens (post-October 2026)
        name: output_tokens
        type: metered
        metric: tokens
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://looker.com
        unit: 1000000
        price: '20.00'
        userMultiplied: false
      - label: Viewer monthly token allocation
        description: 1M input + 20K output included per Viewer user per month
        name: viewer_allocation
        type: quota
        metric: tokens
        limit: 1000000
        timeFrame: month
        geo: global
        domains:
          - https://looker.com
        unit: 1
        price: included
        userMultiplied: true
      - label: Standard monthly token allocation
        description: 2M input + 40K output included per Standard user per month
        name: standard_allocation
        type: quota
        metric: tokens
        limit: 2000000
        timeFrame: month
        geo: global
        domains:
          - https://looker.com
        unit: 1
        price: included
        userMultiplied: true
      - label: Developer monthly token allocation
        description: 4M input + 80K output included per Developer user per month
        name: developer_allocation
        type: quota
        metric: tokens
        limit: 4000000
        timeFrame: month
        geo: global
        domains:
          - https://looker.com
        unit: 1
        price: included
        userMultiplied: true
    elements:
      - name: Natural-language query over Looker semantic model
      - name: Per-user-class monthly token allocations
      - name: Free until 2026-09-30
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
