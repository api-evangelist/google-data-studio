name: Google Data Studio
description: >-
  Google Data Studio, now rebranded as Looker Studio, is a free data
  visualization and business intelligence tool from Google that transforms data
  into customizable, shareable dashboards and reports. It connects to a wide
  range of data sources and supports community connectors and visualizations for
  extensibility.
image: https://www.gstatic.com/analytics-suite/header/suite/v2/ic_data_studio.svg
url: https://lookerstudio.google.com
created: 2024-01-01 00:00:00+00:00
modified: 2026-03-04
specificationVersion: '0.18'
tags:
- Analytics
- Visualization
- Business Intelligence
- Dashboards
- Reporting
- Data
apis:
- name: Google Data Studio API
  description: >-
    The Looker Studio API enables programmatic management of Looker Studio
    assets, including searching for assets and managing permissions within Google
    Workspace or Cloud Identity organizations.
  image: https://www.gstatic.com/analytics-suite/header/suite/v2/ic_data_studio.svg
  humanURL: https://developers.google.com/looker-studio/integrate/api
  baseURL: https://datastudio.googleapis.com
  tags:
  - Assets
  - Permissions
  - Reports
  - Data Sources
