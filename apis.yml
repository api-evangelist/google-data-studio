  - type: Change Log
    url: https://developers.google.com/looker-studio/integrate/api/changelog
- name: Looker Studio Linking API
  description: >-
    The Linking API provides a reliable interface to configure and forward users
    directly to a pre-configured Looker Studio report via URL parameters,
    enabling one-click report creation experiences.
  image: https://www.gstatic.com/analytics-suite/header/suite/v2/ic_data_studio.svg
  humanURL: https://developers.google.com/looker-studio/integrate/linking-api
  tags:
  - Linking
  - Reports
  - Embedding
  - Integration
  properties:
  - type: Documentation
    url: https://developers.google.com/looker-studio/integrate/linking-api
  - type: OpenAPI
    url: openapi/google-data-studio-linking-api-openapi.yml
- name: Looker Studio Community Connectors
  description: >-
    Community Connectors enable direct connections from Looker Studio to any
    internet-accessible data source using Google Apps Script. Developers
    implement getAuthType, getConfig, getSchema, and getData functions to build
    custom connectors.
  image: https://www.gstatic.com/analytics-suite/header/suite/v2/ic_data_studio.svg
  humanURL: https://developers.google.com/looker-studio/connector
  tags:
  - Connectors
  - Data Sources
  - Apps Script
  - Integration
  properties:
  - type: Documentation
    url: https://developers.google.com/looker-studio/connector
  - type: Reference
